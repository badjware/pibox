name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: badjware/pibox

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.harness }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        harness: [pi, claude]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.harness }}
            type=semver,pattern={{version}}-${{ matrix.harness }}
            type=semver,pattern={{major}}.{{minor}}-${{ matrix.harness }}
            type=raw,value=latest,enable=${{ matrix.harness == 'pi' && github.ref_name == github.event.repository.default_branch }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:base
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Build and push harness image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.harness }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:base
          cache-from: type=gha,scope=${{ matrix.harness }}
          cache-to: type=gha,mode=max,scope=${{ matrix.harness }}
